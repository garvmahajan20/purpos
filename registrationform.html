<!DOCTYPE html>
<html>

<head>
    <title>Volunteer Registration</title>
    <link rel="stylesheet" href="registration.css">
</head>

<body>
    <div class="topbar">
        <button id="darkmode" class="theme-btn" type="button"><img src="theme_icon.png" alt="Toggle Theme" class="theme-icon"></button>
    </div>
    <div class="container">
        <div class="registrationpopup">
            <h2> Volunteer Form Registration</h2>
            <div id="stepIndicator" style="font-family:'bodyfont'; font-size:13px; margin-bottom:10px; opacity:0.85;">Step 1 of 2</div>
            <form>
                <div id="step1">
                    <label for="name">Enter your name:</label>
                    <input type="text" id="name" name="name" required minlength="2" maxlength="50" pattern="[A-Za-z ]+"
                        placeholder="John Doe">
                    <label for="phonenumber">Enter your Phone Number:</label>
                    <input type="tel" id="phonenumber" name="phonenumber" required placeholder="+919523987645"
                        pattern="^\+91[0-9]{10}$">
                    <label for="address">Enter your address:</label>
                    <input type="text" id="address" name="address" required placeholder="Baker Street" minlength="5"
                        maxlength="100">
                    <label for="city">City:</label>
                    <input type="text" id="city" readonly>
                    <label for="state">State:</label>
                    <input type="text" id="state" readonly>
                    <label for="locality">Enter your locality:</label>
                    <input type="text" required minlength="2" maxlength="100" id="locality" class="locality">
                    <label for="pincode">Enter your pincode:</label>
                    <input type="text" required minlength="6" id="pincode" class="pincode">
                    <button type="button" id="nextBtn">Next</button>
                </div>
                <div id="step2" style="display: none;">
                    <label for="sector">What can you help with?</label>
                    <input type="text" id="sector" name="sector" placeholder="e.g. Veterinary,Student" required
                        minlength="2" maxlength="200">

                    <label for="travellingrange">How far are you willing to travel (km)?</label>
                    <select name="trvaellingrange" id="travellingrange">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <button type="button" id="backBtn">Back</button>
                    <button type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBWlC4Ceh8Zhcv-I40VY6-hwUUCSwNJDZo&libraries=places"></script>
    <script src="theme.js"></script>
    <script type="module" src="registrationform.js"></script>
<script src="animations.js"></script>
</body>

</html>
